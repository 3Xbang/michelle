# Mira (Villa PMS) - Nginx Location Block
# 添加到现有 server block 中（/etc/nginx/sites-available/ 里的配置文件）
# 后端端口: 4000
# 前端路径: /mira/
# API 路径:  /mira/api/
#
# 使用方法:
#   1. 打开现有的 Nginx 配置: sudo nano /etc/nginx/sites-available/default
#   2. 在 server { } 块内粘贴以下内容
#   3. sudo nginx -t && sudo systemctl reload nginx

# ---- 以下内容粘贴到 server { } 块内 ----

# Mira - 前端 SPA 静态文件
location /mira/ {
    alias /var/www/mira/client/dist/;
    index index.html;
    try_files $uri $uri/ /mira/index.html;

    # 缓存静态资源
    location ~* ^/mira/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Mira - API 反向代理到 Node.js (端口 4000)
location /mira/api/ {
    rewrite ^/mira/api/(.*) /api/$1 break;
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # 上传文件大小限制 (工单图片)
    client_max_body_size 10M;
}

# Mira - 上传文件 (工单图片)
location /mira/uploads/ {
    alias /var/www/mira/server/uploads/;
    expires 30d;
    add_header Cache-Control "public";
}

# ---- 粘贴结束 ----
