# Mira (Villa PMS) - Nginx 配置
# 通过 IP 直接访问，HTTP 模式（内部使用）
# 放到 /etc/nginx/conf.d/mira.conf
#
# 使用方法:
#   1. sudo nano /etc/nginx/conf.d/mira.conf
#   2. 粘贴以下内容
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# 访问地址: http://你的IP/mira/

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Mira - 前端 SPA 静态文件
    location /mira/ {
        alias /var/www/mira/client/dist/;
        index index.html;
        try_files $uri $uri/ /mira/index.html;

        # 缓存静态资源
        location ~* ^/mira/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Mira - API 反向代理到 Node.js (端口 4000)
    location /mira/api/ {
        rewrite ^/mira/api/(.*) /api/$1 break;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 上传文件大小限制 (工单图片)
        client_max_body_size 10M;
    }

    # Mira - 上传文件 (工单图片)
    location /mira/uploads/ {
        alias /var/www/mira/server/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }
}
