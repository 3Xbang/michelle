# Villa PMS - Nginx Configuration
# Deployment: AWS EC2 + Nginx + PM2
# Backend: Node.js Express on port 3000

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

# Rate limiting zone for API (optional, complements Express rate limiter)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Upstream backend
upstream villa_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Logging
    access_log /var/log/nginx/villa-pms-access.log;
    error_log  /var/log/nginx/villa-pms-error.log;

    # Max upload size (ticket photos)
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS - restrict allowed origins
    # Update this to your actual domain in production
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }
    # Add your production domain here, e.g.:
    # if ($http_origin ~* "^https://yourdomain\.com$") {
    #     set $cors_origin $http_origin;
    # }

    # Serve Vue SPA static files
    location / {
        root /var/www/villa-pms/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Reverse proxy API requests to Node.js backend
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://villa_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # CORS headers for API responses
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Serve uploaded files (ticket photos)
    location /uploads/ {
        alias /var/www/villa-pms/server/uploads/;
        expires 30d;
        add_header Cache-Control "public";

        # Restrict to image types only
        location ~* \.(jpg|jpeg|png|gif|webp)$ {
            try_files $uri =404;
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
