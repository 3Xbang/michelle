server {
    listen 80;
    server_name hotel.miraa.asia;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hotel.miraa.asia;

    ssl_certificate /etc/letsencrypt/live/hotel.miraa.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotel.miraa.asia/privkey.pem;

    root /var/www/mira/client/dist;
    index index.html;

    location /mira/api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    location /mira/ {
        alias /var/www/mira/client/dist/;
        try_files $uri $uri/ /mira/index.html;
    }

    location = /mira/index.html {
        alias /var/www/mira/client/dist/index.html;
    }

    location = / {
        return 301 /mira/;
    }
}
